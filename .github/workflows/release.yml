name: Release

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.comment.body, '/release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
    steps:
      - name: Parse command and authorization
        id: parse
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "bump=${{ github.event.inputs.bump }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          body='${{ github.event.comment.body }}'
          assoc='${{ github.event.comment.author_association }}'

          if [[ ! "$body" =~ ^/release([[:space:]]+(patch|minor|major))?[[:space:]]*$ ]]; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "reason=invalid-command" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          bump="${BASH_REMATCH[2]}"
          if [[ -z "$bump" ]]; then
            bump="patch"
          fi

          if [[ "$assoc" != "OWNER" && "$assoc" != "MEMBER" && "$assoc" != "COLLABORATOR" ]]; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "reason=unauthorized" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "allowed=true" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Comment command error
        if: github.event_name == 'issue_comment' && steps.parse.outputs.allowed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const reason = "${{ steps.parse.outputs.reason }}";
            const message =
              reason === "unauthorized"
                ? "Release command rejected. Only repository collaborators can run `/release [patch|minor|major]`."
                : "Invalid release command. Use `/release`, `/release patch`, `/release minor`, or `/release major`.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

      - name: Stop on invalid/unauthorized command
        if: steps.parse.outputs.allowed != 'true'
        run: exit 0

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bump version
        id: bump
        shell: bash
        run: |
          current="$(grep '^version=' gradle.properties | cut -d'=' -f2- | tr -d '[:space:]')"
          if [[ ! "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Unsupported version format in gradle.properties: $current"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "${{ steps.parse.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${{ steps.parse.outputs.bump }}"
              exit 1
              ;;
          esac

          next="${major}.${minor}.${patch}"
          sed -i -E "s/^version=.*/version=${next}/" gradle.properties

          echo "previous=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Build release artifact
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Commit and tag
        shell: bash
        run: |
          version="${{ steps.bump.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add gradle.properties
          git commit -m "chore(release): v${version}"
          git tag "v${version}"
          git push origin HEAD:main
          git push origin "v${version}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.next }}
          name: v${{ steps.bump.outputs.next }}
          generate_release_notes: true
          files: build/libs/*.jar

      - name: Resolve release artifact
        id: artifact
        shell: bash
        run: |
          artifact="$(find build/libs -maxdepth 1 -type f -name '*.jar' | head -n 1)"
          if [[ -z "$artifact" ]]; then
            echo "No JAR artifact found in build/libs"
            exit 1
          fi
          echo "path=$artifact" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$artifact")" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        if: env.MODRINTH_TOKEN != '' && env.MODRINTH_PROJECT_ID != ''
        env:
          VERSION: ${{ steps.bump.outputs.next }}
          VERSION_TYPE: release
          GAME_VERSIONS_JSON: ${{ vars.MODRINTH_GAME_VERSIONS || '["1.20.1"]' }}
          LOADERS_JSON: ${{ vars.MODRINTH_LOADERS || '["paper","spigot","purpur"]' }}
          CHANGELOG: |
            Automated release for v${{ steps.bump.outputs.next }}.
            Bump type: ${{ steps.parse.outputs.bump }}.
        shell: bash
        run: |
          jq -n \
            --arg name "v${VERSION}" \
            --arg version_number "${VERSION}" \
            --arg changelog "${CHANGELOG}" \
            --arg version_type "${VERSION_TYPE}" \
            --arg project_id "${MODRINTH_PROJECT_ID}" \
            --argjson game_versions "${GAME_VERSIONS_JSON}" \
            --argjson loaders "${LOADERS_JSON}" \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              version_type: $version_type,
              featured: false,
              project_id: $project_id,
              game_versions: $game_versions,
              loaders: $loaders,
              dependencies: [],
              file_parts: ["primary_file"]
            }' > modrinth-version.json

          curl --fail-with-body --silent --show-error \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -F "data=@modrinth-version.json;type=application/json" \
            -F "primary_file=@${{ steps.artifact.outputs.path }};type=application/java-archive" \
            https://api.modrinth.com/v2/version

      - name: Comment Modrinth setup hint
        if: github.event_name == 'issue_comment' && (env.MODRINTH_TOKEN == '' || env.MODRINTH_PROJECT_ID == '')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "GitHub release was published, but Modrinth upload is skipped. Set `MODRINTH_TOKEN` and `MODRINTH_PROJECT_ID` secrets to enable it."
            });

      - name: Comment success
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Release published: `v${{ steps.bump.outputs.next }}` (from `${{ steps.bump.outputs.previous }}` with `${{ steps.parse.outputs.bump }}` bump)."
            });
